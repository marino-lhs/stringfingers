<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c1220; }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;



/* ═══════════════════════════════════════════════
   GLOBAL STYLES
   @font-face loads Bravura (professional SMuFL music font) via CSS.
   This does NOT use script injection, so it works in the artifact env.
   If Bravura loads the clefs/accidentals render with engraving-quality glyphs.
   If not, we fall back to Times New Roman musical symbols.
═══════════════════════════════════════════════ */
const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  @font-face {
    font-family: 'Bravura';
    src: url('https://cdn.jsdelivr.net/npm/@vexflow-fonts/bravura/bravura.woff2') format('woff2');
    font-display: block;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c1220; font-family: 'DM Sans', sans-serif; color: #f1ece2; }

  @keyframes pop {
    0%   { transform: scale(0.88); opacity: 0; }
    65%  { transform: scale(1.06); }
    100% { transform: scale(1);    opacity: 1; }
  }
  @keyframes slide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pop   { animation: pop   0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
  .slide { animation: slide 0.3s ease both; }

  .instr-card {
    background: #162032; border: 1.5px solid #253348;
    border-radius: 18px; padding: 28px 22px;
    cursor: pointer; text-align: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    font-family: 'DM Sans', sans-serif; color: #f1ece2; width: 100%;
  }
  .instr-card:hover {
    border-color: #c89b3c; background: #1a2d45; transform: translateY(-2px);
  }
`;

/* ═══════════════════════════════════════════════
   MUSIC DATA
═══════════════════════════════════════════════ */
// Pitch class 0–11: diatonic index (d), accidental ('sharp'|'flat'|'')
const PITCH = [
  { d: 0, a: ""      }, // C
  { d: 0, a: "sharp" }, // C#
  { d: 1, a: ""      }, // D
  { d: 2, a: "flat"  }, // Eb
  { d: 2, a: ""      }, // E
  { d: 3, a: ""      }, // F
  { d: 3, a: "sharp" }, // F#
  { d: 4, a: ""      }, // G
  { d: 5, a: "flat"  }, // Ab
  { d: 5, a: ""      }, // A
  { d: 6, a: "flat"  }, // Bb
  { d: 6, a: ""      }, // B
];

const INSTR = {
  violin: {
    name: "Violin", clef: "treble",
    strs: [{ n: "G", m: 55 }, { n: "D", m: 62 }, { n: "A", m: 69 }, { n: "E", m: 76 }],
    maxP: 7, desc: "G · D · A · E  ·  Treble clef",
  },
  viola: {
    name: "Viola", clef: "alto",
    strs: [{ n: "C", m: 48 }, { n: "G", m: 55 }, { n: "D", m: 62 }, { n: "A", m: 69 }],
    maxP: 7, desc: "C · G · D · A  ·  Alto clef",
  },
  cello: {
    name: "Cello", clef: "bass",
    strs: [{ n: "C", m: 36 }, { n: "G", m: 43 }, { n: "D", m: 50 }, { n: "A", m: 57 }],
    maxP: 7, desc: "C · G · D · A  ·  Bass clef",
  },
  // Bass: transposing instrument (8vb). MIDI = sounding pitch.
  // displayMidi() adds 12 so the WRITTEN pitch appears on the staff.
  bass: {
    name: "Double Bass", clef: "bass",
    strs: [{ n: "E", m: 28 }, { n: "A", m: 33 }, { n: "D", m: 38 }, { n: "G", m: 43 }],
    maxP: 5, desc: "E · A · D · G  ·  Bass clef (8vb)",
  },
};

// absD of the BOTTOM staff line per clef  (absD = octave×7 + diatonic)
// Treble → E4 (2nd octave above middle C): 4×7+2 = 30
// Bass   → G2: 2×7+4 = 18
// Alto   → F3: 3×7+3 = 24
const CLEF_BOT = { treble: 30, bass: 18, alto: 24 };

const OK_MSGS = [
  "Correct! 🎵","Nice work!","Spot on!","Excellent!","Perfect!",
  "Nailed it! 🎶","Well played!","Brilliant!","Right on!","You got it!",
];

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
const pc  = midi => ((midi % 12) + 12) % 12;
const oct = midi => Math.floor(midi / 12) - 1;

function staffStep(midi, clef) {
  const p = pc(midi);
  return oct(midi) * 7 + PITCH[p].d - CLEF_BOT[clef];
}

// Bass is a transposing instrument — staff shows written pitch (sounding + 8va)
function displayMidi(instrKey, soundingMidi) {
  return instrKey === "bass" ? soundingMidi + 12 : soundingMidi;
}

function availableNotes(k) {
  const s = new Set();
  INSTR[k].strs.forEach(str => {
    for (let p = 0; p <= INSTR[k].maxP; p++) s.add(str.m + p);
  });
  return [...s].sort((a, b) => a - b);
}

function randNote(k, exclude) {
  const pool = availableNotes(k).filter(n => n !== exclude);
  return pool[Math.floor(Math.random() * pool.length)];
}

function correctPositions(k, targetMidi) {
  const res = [];
  INSTR[k].strs.forEach((s, si) => {
    for (let p = 0; p <= INSTR[k].maxP; p++)
      if (s.m + p === targetMidi) res.push({ si, p });
  });
  return res;
}

function make10(k) {
  const out = []; let last = null;
  for (let i = 0; i < 10; i++) { const n = randNote(k, last); out.push(n); last = n; }
  return out;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function formatTime(secs) {
  return `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, "0")}`;
}

/* ═══════════════════════════════════════════════
   STAFF LAYOUT CONSTANTS
   LS  = distance between adjacent staff lines (one "space")
   HS  = half of LS = one staff position step
   botY = y-coordinate of the bottom (1st) staff line
═══════════════════════════════════════════════ */
const LS    = 16;
const HS    = LS / 2;
const W_SVG = 190;
const H_SVG = 230;
const MID_Y = 108;                   // y of middle (3rd) staff line = step 4
const BOT_Y = MID_Y + 2 * LS;       // y of bottom (1st) staff line = step 0 = 140

// Note head is placed at ~72% from left (after clef + accidental space)
const NOTE_X = 138;
const NRX = 9, NRY = 6;             // note-head semi-axes

/* ═══════════════════════════════════════════════
   STAFF SVG
═══════════════════════════════════════════════ */
function StaffView({ midi, clef, useBravura }) {
  if (!midi) return null;

  const step  = staffStep(midi, clef);
  const acc   = PITCH[pc(midi)].a;
  const noteY = BOT_Y - step * HS;
  const stemUp = step < 4;

  // Five staff lines at steps 0, 2, 4, 6, 8
  const staffYs = [0, 2, 4, 6, 8].map(s => BOT_Y - s * HS);

  // Ledger lines below staff (step < 0, even steps)
  const ledgers = [];
  if (step < 0) {
    const lo = step % 2 === 0 ? step : step + 1;
    for (let s = -2; s >= lo; s -= 2) ledgers.push(BOT_Y - s * HS);
  }
  // Ledger lines above staff (step > 8, even steps)
  if (step > 8) {
    const hi = step % 2 === 0 ? step : step - 1;
    for (let s = 10; s <= hi; s += 2) ledgers.push(BOT_Y - s * HS);
  }

  const stemX    = stemUp ? NOTE_X + NRX : NOTE_X - NRX;
  const stemEndY = stemUp ? noteY - 3.5 * LS : noteY + 3.5 * LS;

  return (
    <svg width={W_SVG} height={H_SVG} viewBox={`0 0 ${W_SVG} ${H_SVG}`}
      style={{ display: "block" }}>

      {/* Parchment background */}
      <rect x={0} y={0} width={W_SVG} height={H_SVG} fill="#FBF7EE" rx={10} />

      {/* Staff lines */}
      {staffYs.map((y, i) => (
        <line key={i} x1={28} y1={y} x2={W_SVG - 8} y2={y} stroke="#555" strokeWidth={1.2} />
      ))}

      {/* Ledger lines */}
      {ledgers.map((y, i) => (
        <line key={`ld${i}`}
          x1={NOTE_X - LS - 2} y1={y} x2={NOTE_X + LS + 2} y2={y}
          stroke="#555" strokeWidth={1.2} />
      ))}

      {/* Clef */}
      <ClefGlyph clef={clef} useBravura={useBravura} />

      {/* Accidental */}
      {acc && (
        <AccidentalGlyph
          type={acc} noteY={noteY} useBravura={useBravura}
          x={NOTE_X - NRX - (useBravura ? LS * 0.25 : LS * 0.5)}
        />
      )}

      {/* Stem */}
      <line x1={stemX} y1={noteY} x2={stemX} y2={stemEndY}
        stroke="#111" strokeWidth={1.5} />

      {/* Note head */}
      <ellipse cx={NOTE_X} cy={noteY} rx={NRX} ry={NRY}
        fill="#111" transform={`rotate(-12,${NOTE_X},${noteY})`} />
    </svg>
  );
}

/* ─── Clef glyphs ────────────────────────────────────────────
   Bravura SMuFL: font-size = LS × 4 (so 1 staff space = 0.25em)
   Glyph origin (text baseline) is placed ON the reference pitch line:
     Treble → G line  = BOT_Y − LS
     Bass   → F line  = BOT_Y − 3×LS
     Alto   → C4 line = BOT_Y − 2×LS
   Times New Roman fallback uses U+1D11E/1D122/1D121 with empirically
   tuned sizes and positions.
────────────────────────────────────────────────────────────── */
function ClefGlyph({ clef, useBravura }) {
  if (useBravura) {
    // Bravura SMuFL codepoints + SMuFL-standard origin positions
    const bravura = "'Bravura', 'Times New Roman', serif";
    const fSize   = LS * 4; // 1 staff space = 0.25em → 4em = 4 staff spaces
    const chars   = { treble: "\uE050", bass: "\uE062", alto: "\uE05C" };
    const yPos    = {
      treble: BOT_Y - LS,         // G line (2nd line from bottom)
      bass:   BOT_Y - 3 * LS,     // F line (4th line from bottom)
      alto:   BOT_Y - 2 * LS,     // C4 line (middle/3rd line)
    };
    return (
      <text x={6} y={yPos[clef]} fontSize={fSize}
        fontFamily={bravura} fill="#1a1a1a"
        style={{ userSelect: "none" }}>
        {chars[clef]}
      </text>
    );
  }

  // Times New Roman fallback — proportional to LS
  const font = "'Times New Roman','Palatino Linotype','Georgia',serif";
  if (clef === "treble")
    return (
      <text x={4} y={BOT_Y + LS * 1.1} fontSize={LS * 7.4}
        fontFamily={font} fill="#1a1a1a" style={{ userSelect: "none" }}>
        {"\u{1D11E}"}
      </text>
    );
  if (clef === "bass")
    return (
      <text x={4} y={BOT_Y - LS * 1.0} fontSize={LS * 4.3}
        fontFamily={font} fill="#1a1a1a" style={{ userSelect: "none" }}>
        {"\u{1D122}"}
      </text>
    );
  if (clef === "alto")
    return (
      <text x={2} y={BOT_Y + LS * 0.2} fontSize={LS * 4.7}
        fontFamily={font} fill="#1a1a1a" style={{ userSelect: "none" }}>
        {"\u{1D121}"}
      </text>
    );
  return null;
}

/* ─── Accidental glyphs ─────────────────────────────────────
   Bravura: U+E262 (sharp) / U+E260 (flat), fontSize = LS×4.
   The SMuFL origin is at the pitch center → text y = noteY.
   Times New Roman: ♯/♭ with baseline shifted to visually centre.
────────────────────────────────────────────────────────────── */
function AccidentalGlyph({ type, noteY, x, useBravura }) {
  if (useBravura) {
    const char  = type === "sharp" ? "\uE262" : "\uE260";
    return (
      <text x={x} y={noteY} fontSize={LS * 4}
        fontFamily="'Bravura', 'Times New Roman', serif"
        textAnchor="end" fill="#111"
        style={{ userSelect: "none" }}>
        {char}
      </text>
    );
  }

  // Times New Roman fallback
  const font = "'Times New Roman','Palatino Linotype',serif";
  if (type === "sharp")
    return (
      <text x={x} y={noteY + LS * 0.4} fontSize={LS * 2.2}
        fontFamily={font} textAnchor="end" fill="#111"
        style={{ userSelect: "none" }}>♯</text>
    );
  return (
    <text x={x} y={noteY + LS * 1.2} fontSize={LS * 2.4}
      fontFamily={font} textAnchor="end" fill="#111"
      style={{ userSelect: "none" }}>♭</text>
  );
}

/* ═══════════════════════════════════════════════
   FINGERING CHART
═══════════════════════════════════════════════ */
function FChart({ instrKey, onAns, answered, corrP, selAns }) {
  const inst = INSTR[instrKey];
  const { strs, maxP } = inst;
  const [hov, setHov]  = useState(null);

  const PL = 36, PR = 20, PB = 22;
  const SS = 48, RH = 28;
  const CR = 14, DR = 12;

  const openY = 28;
  const sepY  = openY + CR + 9;          // = 51 — separator line
  const PT    = sepY + DR + 9;           // = 72 — centre of first fingered row

  const W = PL + (strs.length - 1) * SS + PR;
  const H = PT + (maxP - 1) * RH + DR + PB;

  const sx   = i => PL + i * SS;
  const rowY = p => PT + (p - 1) * RH;

  function cellState(si, p) {
    if (!answered) return "idle";
    const sel  = selAns && selAns.si === si && selAns.p === p;
    const corr = corrP.some(c => c.si === si && c.p === p);
    if (sel && corr)  return "correct";
    if (sel && !corr) return "wrong";
    if (corr)         return "show-correct";
    return "idle";
  }

  function cellFill(si, p) {
    const st    = cellState(si, p);
    const isHov = !answered && hov && hov.si === si && hov.p === p;
    if (st === "correct" || st === "show-correct")
      return { fill: "#22c55e", stroke: "#15803d", sw: 2 };
    if (st === "wrong")
      return { fill: "#ef4444", stroke: "#b91c1c", sw: 2 };
    if (isHov)
      return { fill: "#fde68a", stroke: "#ca8a04", sw: 1.5 };
    return { fill: "white", stroke: "#8896aa", sw: 1.2 };
  }

  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}
      style={{ display: "block", margin: "0 auto" }}>

      {/* String lines */}
      {strs.map((_, i) => (
        <line key={i}
          x1={sx(i)} y1={openY + CR + 2}
          x2={sx(i)} y2={H - PB}
          stroke="#C9A057" strokeWidth={2} />
      ))}

      {/* Position number labels */}
      {Array.from({ length: maxP }, (_, i) => i + 1).map(p => (
        <text key={p} x={PL - 16} y={rowY(p) + 5}
          fontSize={11} fill="#94a3b8" fontWeight="500"
          textAnchor="middle" fontFamily="'DM Sans',sans-serif">{p}</text>
      ))}

      {/* Separator — prominent, centred between the two rows */}
      <line
        x1={PL - 14} y1={sepY}
        x2={PL + (strs.length - 1) * SS + 14} y2={sepY}
        stroke="#94a3b8" strokeWidth={2} strokeDasharray="5 3" />

      {/* Open string circles */}
      {strs.map((str, si) => {
        const { fill, stroke, sw } = cellFill(si, 0);
        const tf = (fill === "white" || fill === "#fde68a") ? "#222" : "white";
        return (
          <g key={`open${si}`}
            style={{ cursor: answered ? "default" : "pointer" }}
            onClick={() => !answered && onAns(si, 0)}
            onMouseEnter={() => !answered && setHov({ si, p: 0 })}
            onMouseLeave={() => setHov(null)}>
            <circle cx={sx(si)} cy={openY} r={CR}
              fill={fill} stroke={stroke} strokeWidth={sw} />
            <text x={sx(si)} y={openY + 5}
              textAnchor="middle" fontSize={13}
              fontFamily="'DM Sans',sans-serif" fontWeight="600"
              fill={tf} style={{ userSelect: "none", pointerEvents: "none" }}>
              {str.n}
            </text>
          </g>
        );
      })}

      {/* Fingered position dots */}
      {Array.from({ length: maxP }, (_, i) => i + 1).map(pos =>
        strs.map((_, si) => {
          const { fill, stroke, sw } = cellFill(si, pos);
          return (
            <g key={`${si}-${pos}`}
              style={{ cursor: answered ? "default" : "pointer" }}
              onClick={() => !answered && onAns(si, pos)}
              onMouseEnter={() => !answered && setHov({ si, p: pos })}
              onMouseLeave={() => setHov(null)}>
              <circle cx={sx(si)} cy={rowY(pos)} r={DR}
                fill={fill} stroke={stroke} strokeWidth={sw} />
            </g>
          );
        })
      )}
    </svg>
  );
}

/* ═══════════════════════════════════════════════
   SCREEN: INSTRUMENT SELECT
═══════════════════════════════════════════════ */
const CLEF_CHAR = { treble: "𝄞", bass: "𝄢", alto: "𝄡" };

function InstrSelect({ onSelect }) {
  return (

    }}>
      <style>{CSS}</style>
      <div style={{ textAlign: "center", marginBottom: 44 }}>
        <div style={{
          fontFamily: "'Times New Roman',serif", fontSize: 48,
          color: "#c89b3c", marginBottom: 16, letterSpacing: 4,
        }}>𝄞 𝄢 𝄡</div>
        <h1 style={{
          fontFamily: "'Playfair Display',serif",
          fontSize: "clamp(30px,5vw,50px)", fontWeight: 700,
          color: "#f1ece2", marginBottom: 10,

      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(2,1fr)",

        {Object.entries(INSTR).map(([k, inst]) => (
          <button key={k} className="instr-card slide" onClick={() => onSelect(k)}>
            <div style={{

/* ═══════════════════════════════════════════════
   SCREEN: MODE SELECT
═══════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════
   SCREEN: CHALLENGE COMPLETE
═══════════════════════════════════════════════ */
function ChallengeDone({ stats, elapsed, onAgain, onPractice, onHome }) {
  const pct   = stats.attempts > 0 ? Math.round(stats.correct / stats.attempts * 100) : 0;
  const grade =
    pct >= 90 ? "🏆 Excellent!"    :
    pct >= 70 ? "🎖️ Great work!"   :
    pct >= 50 ? "👍 Good effort"   :
    pct >= 30 ? "📚 Keep at it"    : "🎻 More practice!";
  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center",
      justifyContent: "center", padding: 24, background: "#0c1220",
    }}>
      <style>{CSS}</style>
      <div className="pop" style={{
        background: "#111f33", border: "1px solid #253348",
        borderRadius: 22, padding: "48px 40px",
        maxWidth: 440, width: "100%", textAlign: "center",
      }}>
        <h2 style={{
          fontFamily: "'Playfair Display',serif",
          fontSize: 34, fontWeight: 700, color: "#f1ece2", marginBottom: 8,
        }}>Challenge Complete!</h2>
        <div style={{ fontSize: 24, color: "#c89b3c", marginBottom: 30 }}>{grade}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 34 }}>
          {[["Score",`${stats.correct}/10`],["Accuracy",`${pct}%`],["Time",formatTime(elapsed)]].map(([lbl,val]) => (
            <div key={lbl} style={{ background: "#0c1220", borderRadius: 12, padding: "16px 8px" }}>
              <div style={{
                fontSize: 26, fontWeight: 700, color: "#f1ece2",
                fontFamily: "'Playfair Display',serif",
              }}>{val}</div>
              <div style={{ fontSize: 11, color: "#4b5563", marginTop: 4 }}>{lbl}</div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <button onClick={onAgain} style={{
            background: "#c89b3c", border: "none", borderRadius: 10,
            padding: "14px", color: "#0c1220", fontWeight: 700,
            fontSize: 16, cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
          }}>Play Again</button>
          <button onClick={onPractice} style={{
            background: "#162032", border: "1px solid #253348", borderRadius: 10,
            padding: "14px", color: "#f1ece2", fontWeight: 500,
            fontSize: 15, cursor: "pointer", fontFamily: "'DM Sans',sans-serif",
          }}>Switch to Practice Mode</button>
          <button onClick={onHome} style={{
            background: "none", border: "none", color: "#4b5563",
            fontSize: 14, cursor: "pointer", fontFamily: "'DM Sans',sans-serif", marginTop: 4,
          }}>Change Instrument</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCREEN: PLAYING
   Fixed-height feedback zone so the staff + chart never shift.
═══════════════════════════════════════════════ */
function PlayScreen({
  instrKey, mode, midi, answered, selAns, corrP,
  feedback, isCorrect, stats, challIdx, elapsed,
  useBravura, onAns, onNext, onHome,
}) {
  const inst    = INSTR[instrKey];
  const isLastQ = mode === "challenge" && challIdx >= 9;
  const staffMidi = displayMidi(instrKey, midi);

  return (
    <div style={{ minHeight: "100vh", background: "#0c1220", display: "flex", flexDirection: "column" }}>
      <style>{CSS}</style>

      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "14px 22px", borderBottom: "1px solid #162032",
        flexWrap: "wrap", gap: 10,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={onHome} style={{
            background: "none", border: "1px solid #253348",
            color: "#6b7280", padding: "6px 14px", borderRadius: 8,
            cursor: "pointer", fontSize: 13, fontFamily: "'DM Sans',sans-serif",
          }}>← Home</button>
          <div>
            <span style={{ color: "#c89b3c", fontSize: 12, textTransform: "uppercase", letterSpacing: 2 }}>
              {inst.name}
            </span>
            <span style={{ color: "#253348", margin: "0 8px" }}>·</span>
            <span style={{ color: "#4b5563", fontSize: 12, textTransform: "uppercase", letterSpacing: 1 }}>
              {mode === "challenge" ? "Challenge" : "Practice"}
            </span>
          </div>
        </div>
        <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
          {mode === "challenge" && (
            <>
              <div style={{ color: "#6b7280", fontSize: 13 }}>
                Q <strong style={{ color: "#f1ece2" }}>{challIdx + 1}</strong>/10
              </div>
              <div style={{
                fontVariantNumeric: "tabular-nums",
                color: "#c89b3c", fontSize: 17, fontWeight: 600,
                fontFamily: "'DM Sans',sans-serif", letterSpacing: 1,
              }}>⏱ {formatTime(elapsed)}</div>
            </>
          )}
          <div style={{ fontSize: 13, color: "#6b7280" }}>
            <strong style={{ color: "#22c55e", fontSize: 16 }}>{stats.correct}</strong>
            <span style={{ color: "#253348" }}> / </span>
            <strong style={{ color: "#f1ece2" }}>{stats.attempts}</strong>
            {stats.attempts > 0 && (
              <span style={{ color: "#4b5563" }}>
                {" "}· {Math.round(stats.correct / stats.attempts * 100)}%
              </span>
            )}
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{
        flex: 1, display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        padding: "28px 16px 0",
      }}>
        {/* Staff + Chart — never shift */}
        <div style={{
          display: "flex", flexWrap: "wrap",
          gap: 28, justifyContent: "center", alignItems: "flex-start",
        }}>
          <div style={{
            background: "#111f33", borderRadius: 16,
            padding: "14px 14px 10px", border: "1px solid #1e3054",
            boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
          }}>
            <p style={{
              color: "#94a3b8", fontSize: 10, textAlign: "center",
              marginBottom: 10, letterSpacing: 2, textTransform: "uppercase",
            }}>Find this note</p>
            <StaffView midi={staffMidi} clef={inst.clef} useBravura={useBravura} />
          </div>

          <div style={{
            background: "#111f33", borderRadius: 16,
            padding: "14px 18px 18px", border: "1px solid #1e3054",
            boxShadow: "0 8px 32px rgba(0,0,0,0.5)",
          }}>
            <p style={{
              color: "#94a3b8", fontSize: 10, textAlign: "center",
              marginBottom: 10, letterSpacing: 2, textTransform: "uppercase",
            }}>Click the position ↓</p>
            <FChart
              instrKey={instrKey} onAns={onAns}
              answered={answered} corrP={corrP} selAns={selAns}
            />
          </div>
        </div>

        {/* Fixed-height feedback zone — staff/chart above never shifts */}
        <div style={{
          height: 126, flexShrink: 0,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          gap: 14, paddingBottom: 8,
        }}>
          {feedback && (
            <div
              className={isCorrect ? "pop" : "slide"}
              style={{
                padding: "11px 24px", borderRadius: 12,
                background: isCorrect
                  ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.12)",
                border: `1px solid ${isCorrect
                  ? "rgba(34,197,94,0.35)" : "rgba(239,68,68,0.35)"}`,
                color: isCorrect ? "#86efac" : "#fca5a5",
                fontSize: 15, fontWeight: 500, textAlign: "center",
              }}>
              {feedback}
            </div>
          )}
          {answered && (
            <button onClick={onNext} className="pop" style={{
              background: "#c89b3c", border: "none", borderRadius: 10,
              padding: "11px 34px", color: "#0c1220",
              fontWeight: 700, fontSize: 15, cursor: "pointer",
              fontFamily: "'DM Sans',sans-serif",
              boxShadow: "0 4px 16px rgba(200,155,60,0.35)",
            }}>
              {isLastQ ? "See Results →" : "Next Note →"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function App() {
  const [instrKey,  setInstrKey]  = useState(null);
  const [mode,      setMode]      = useState(null);
  const [phase,     setPhase]     = useState("selectInstr");

  const [midi,      setMidi]      = useState(null);
  const [answered,  setAnswered]  = useState(false);
  const [selAns,    setSelAns]    = useState(null);
  const [corrP,     setCorrP]     = useState([]);
  const [feedback,  setFeedback]  = useState("");
  const [isCorrect, setIsCorrect] = useState(null);
  const [stats,     setStats]     = useState({ correct: 0, attempts: 0 });

  const [challNotes, setChallNotes] = useState([]);
  const [challIdx,   setChallIdx]   = useState(0);
  const [elapsed,    setElapsed]    = useState(0);
  const timerRef = useRef(null);

  // Try to use the Bravura font for high-quality music symbols.
  // This is purely an enhancement — if the font doesn't load, we use
  // Times New Roman. The quiz works and shows notation immediately either way.
  const [useBravura, setUseBravura] = useState(false);
  useEffect(() => {
    if (!document?.fonts) return;
    document.fonts.ready.then(() => {
      setUseBravura(document.fonts.check(`${LS * 4}px Bravura`));
    });
  }, []);

  /* ── Count-up timer ── */
  useEffect(() => {
    if (phase === "playing" && mode === "challenge") {
      timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
      return () => clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [phase, mode]);

  function resetQuestion() {
    setAnswered(false); setSelAns(null); setCorrP([]);
    setFeedback(""); setIsCorrect(null);
  }

  function beginMode(k, m) {
    setMode(m); setStats({ correct: 0, attempts: 0 }); setElapsed(0);
    resetQuestion();
    if (m === "challenge") {
      const notes = make10(k);
      setChallNotes(notes); setChallIdx(0); setMidi(notes[0]);
    } else {
      setMidi(randNote(k, null));
    }
    setPhase("playing");
  }

  function onSelectInstr(k) { setInstrKey(k); setPhase("selectMode"); }
  function onSelectMode(m)  { beginMode(instrKey, m); }

  function onAnswer(si, p) {
    if (answered) return;
    const targetMidi = mode === "challenge" ? challNotes[challIdx] : midi;
    const clickMidi  = INSTR[instrKey].strs[si].m + p;
    const ok         = clickMidi === targetMidi;
    setCorrP(correctPositions(instrKey, targetMidi));
    setSelAns({ si, p });
    setAnswered(true);
    setIsCorrect(ok);
    setFeedback(ok ? pick(OK_MSGS) : "Not quite — correct position highlighted in green.");
    setStats(s => ({ correct: s.correct + (ok ? 1 : 0), attempts: s.attempts + 1 }));
  }

  function onNext() {
    if (mode === "challenge") {
      const next = challIdx + 1;
      if (next >= 10) { clearInterval(timerRef.current); setPhase("done"); return; }
      setChallIdx(next); setMidi(challNotes[next]);
    } else {
      setMidi(randNote(instrKey, midi));
    }
    resetQuestion();
  }

  if (phase === "selectInstr") return <InstrSelect onSelect={onSelectInstr} />;
  if (phase === "selectMode")
    return <ModeSelect instrKey={instrKey} onSelect={onSelectMode}
      onBack={() => setPhase("selectInstr")} />;
  if (phase === "done")
    return <ChallengeDone stats={stats} elapsed={elapsed}
      onAgain={() => beginMode(instrKey, "challenge")}
      onPractice={() => beginMode(instrKey, "practice")}
      onHome={() => setPhase("selectInstr")} />;

  return (
    <PlayScreen
      instrKey={instrKey} mode={mode} midi={midi}
      answered={answered} selAns={selAns} corrP={corrP}
      feedback={feedback} isCorrect={isCorrect} stats={stats}
      challIdx={challIdx} elapsed={elapsed}
      useBravura={useBravura}
      onAns={onAnswer} onNext={onNext}
      onHome={() => setPhase("selectInstr")}
    />
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
